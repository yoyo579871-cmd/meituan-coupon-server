name: 美团惠省优惠助手 - 每日自动领券

on:
  schedule:
    # 每天北京时间 9:00 (UTC+8) → UTC 1:00
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  claim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 领券
        env:
          MEITUAN_USER_TOKEN: ${{ secrets.MEITUAN_USER_TOKEN }}
          MEITUAN_AI_SCENE: ${{ secrets.MEITUAN_AI_SCENE }}
        run: python3 huisheng_claim.py
