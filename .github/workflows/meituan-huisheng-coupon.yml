name: 美团惠省优惠助手 - 每日自动领券

on:
  schedule:
    # UTC 18:00 = 北京凌晨02:00，对冲GitHub 7-8小时延迟后实际在北京09:00-10:00触发
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  claim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 领券
        env:
          MEITUAN_USER_TOKEN: ${{ secrets.MEITUAN_USER_TOKEN }}
          MEITUAN_AI_SCENE: ${{ secrets.MEITUAN_AI_SCENE }}
        run: python3 huisheng_claim.py
