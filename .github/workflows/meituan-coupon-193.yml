name: 美团每日自动领券（19397868909）

on:
  schedule:
    # 北京时间每天 11:00 = UTC 03:00
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Claim Coupon
        env:
          MEITUAN_USER_TOKEN:   ${{ secrets.MEITUAN_USER_TOKEN_193 }}
          MEITUAN_PHONE_MASKED: ${{ secrets.MEITUAN_PHONE_MASKED_193 }}
        run: python claim.py
