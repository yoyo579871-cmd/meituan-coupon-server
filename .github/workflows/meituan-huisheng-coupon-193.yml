name: 美团惠省优惠助手 - 每日自动领券（19397868909）

on:
  schedule:
    # UTC 18:00 = 北京凌晨02:00，对冲GitHub 7-8小时延迟后实际在北京09:00-10:00触发
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Claim Huisheng Coupon
        env:
          MEITUAN_USER_TOKEN: ${{ secrets.MEITUAN_USER_TOKEN_193 }}
          MEITUAN_AI_SCENE:   ${{ secrets.MEITUAN_AI_SCENE }}
        run: python huisheng_claim.py
